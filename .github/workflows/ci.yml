name: Zig CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run Demo
        run: |
          zig build
          cp zig-out/lib/libinvima_ffi.so examples/
          python examples/demo.py

      - name: Build Release (with UPX)
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          ./scripts/build.sh --release --upx

      # Regression guard for the class of bug fixed in build.zig: CI runners
      # may have a newer CPU (VAES/AVX-512) than real deployment targets
      # (e.g. Cascade Lake Xeons), so a binary that merely runs *here* proves
      # nothing about portability. QEMU user-mode emulates an older baseline
      # CPU on the same host arch — an illegal instruction shows up as a
      # SIGILL here instead of in production.
      - name: Smoke test under baseline-CPU emulation (Nehalem, no AVX)
        run: |
          sudo apt-get install -y qemu-user
          cp zig-out/lib/libinvima_ffi.so examples/
          qemu-x86_64 -cpu Nehalem "$(command -v python3)" examples/demo.py
